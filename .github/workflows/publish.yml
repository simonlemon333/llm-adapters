name: Publish to PyPI

# Trigger: only on GitHub Release (not manual push)
on:
  release:
    types: [published]

# OIDC permissions for Trusted Publishers
permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      # --- Anti-.pth attack: deep scan ---
      - name: Security scan — unpack and reject .pth files
        run: |
          echo "=== Scanning wheel contents ==="
          mkdir -p /tmp/wheel-inspect
          cd /tmp/wheel-inspect
          python -m zipfile -e $GITHUB_WORKSPACE/dist/*.whl .

          # Check for .pth files INSIDE the wheel (this is how LiteLLM was attacked)
          if find . -name "*.pth" | grep -q .; then
            echo "ABORT: .pth file found inside wheel!"
            find . -name "*.pth" -ls
            exit 1
          fi

          # Check for suspicious scripts that run on install
          if find . -name "*.py" -path "*/.data/scripts/*" | grep -q .; then
            echo "WARNING: Custom install scripts found:"
            find . -name "*.py" -path "*/.data/scripts/*" -ls
          fi

          echo "No .pth files found inside wheel"

      - name: Security scan — verify only expected files in wheel
        run: |
          echo "=== Wheel contents ==="
          python -c "
          import zipfile, sys
          whl = list(__import__('pathlib').Path('dist').glob('*.whl'))[0]
          with zipfile.ZipFile(whl) as z:
              for f in sorted(z.namelist()):
                  # Flag anything that's not .py, .pyi, py.typed, or metadata
                  suspicious = not any(f.endswith(ext) for ext in
                      ('.py', '.pyi', '.typed', '.txt', '.md', '.toml',
                       'METADATA', 'WHEEL', 'RECORD', 'entry_points.txt', 'top_level.txt'))
                  flag = ' <<< UNEXPECTED' if suspicious and not f.endswith('/') else ''
                  print(f'  {f}{flag}')
          "

      - name: Security scan — check entry_points for hijacking
        run: |
          python -c "
          import zipfile, configparser, io
          whl = list(__import__('pathlib').Path('dist').glob('*.whl'))[0]
          with zipfile.ZipFile(whl) as z:
              for name in z.namelist():
                  if name.endswith('entry_points.txt'):
                      content = z.read(name).decode()
                      print('entry_points.txt:')
                      print(content)
                      # Only our own entry point should exist
                      if 'llm_adapters' not in content and content.strip():
                          print('ABORT: Unexpected entry points detected!')
                          raise SystemExit(1)
          print('Entry points OK')
          "

      - name: Security scan — sdist contents
        run: |
          echo "=== Sdist contents ==="
          tar tzf dist/*.tar.gz

      - name: Verify package metadata
        run: |
          pip install twine
          twine check dist/*

      - name: Generate SHA-256 hashes
        run: |
          echo "=== Package hashes ==="
          sha256sum dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: |
            dist/*.whl
            dist/*.tar.gz

  # Run tests on the built package (not source) to catch packaging issues
  test-built:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Install built wheel + test deps
        run: |
          pip install dist/*.whl
          pip install pytest pytest-asyncio pytest-httpx

      - name: Test against built package
        run: pytest tests/ -v

  publish:
    needs: [build, test-built]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/llm-dial
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      # Trusted Publisher — no tokens, no secrets, OIDC only
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # No api-token needed — uses OIDC Trusted Publisher
