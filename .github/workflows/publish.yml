name: Publish to PyPI

# Trigger: only on GitHub Release (not manual push)
on:
  release:
    types: [published]

# OIDC permissions for Trusted Publishers
permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      # --- Anti-.pth attack: scan the built package ---
      - name: Security scan — reject .pth files
        run: |
          echo "Scanning dist/ for .pth files..."
          if find dist/ -name "*.pth" | grep -q .; then
            echo "ABORT: .pth file detected in package!"
            find dist/ -name "*.pth" -ls
            exit 1
          fi
          echo "No .pth files found"

      - name: Security scan — list package contents
        run: |
          echo "=== Wheel contents ==="
          python -m zipfile -l dist/*.whl
          echo ""
          echo "=== Sdist contents ==="
          tar tzf dist/*.tar.gz

      - name: Verify package metadata
        run: |
          pip install twine
          twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # Run tests on the built package (not source) to catch packaging issues
  test-built:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Install built wheel + test deps
        run: |
          pip install dist/*.whl
          pip install pytest pytest-asyncio pytest-httpx

      - name: Test against built package
        run: pytest tests/ -v

  publish:
    needs: [build, test-built]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/llm-adapters
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      # Trusted Publisher — no tokens, no secrets, OIDC only
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # No api-token needed — uses OIDC Trusted Publisher
