name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check llm_adapters/ tests/

      - name: Type check
        run: mypy llm_adapters/

      - name: Test
        run: pytest tests/ -v

      - name: Security audit
        run: pip-audit --ignore-vuln CVE-2026-4539 --skip-editable
